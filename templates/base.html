<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}TicketOS{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none; z-index: 0;
    }
    @keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }

    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle { position: absolute; width: 2px; height: 2px; background: rgba(139,92,246,0.6); border-radius: 50%; animation: float linear infinite; }
    @keyframes float { 0% { transform: translateY(100vh); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) translateX(80px); opacity: 0; } }

    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(139,92,246,0.2); border-radius: 16px; position: relative; overflow: hidden; }
    .glass::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(139,92,246,0.8), transparent); animation: scanTop 5s ease-in-out infinite; }
    @keyframes scanTop { 0% { left: -100%; } 50% { left: 100%; } 100% { left: 100%; } }

    .glass-nav { background: rgba(15,12,41,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(139,92,246,0.3); box-shadow: 0 0 30px rgba(139,92,246,0.1); }
    .glass-card { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(139,92,246,0.15); border-radius: 12px; transition: all 0.3s ease; position: relative; overflow: hidden; }
    .glass-card:hover { border-color: rgba(139,92,246,0.5); transform: translateY(-3px); box-shadow: 0 0 25px rgba(139,92,246,0.2), 0 8px 32px rgba(0,0,0,0.3); }
    .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(139,92,246,0.2); color: white; border-radius: 10px; transition: all 0.3s; }
    .glass-input:focus { outline: none; border-color: rgba(139,92,246,0.8); background: rgba(139,92,246,0.08); box-shadow: 0 0 0 3px rgba(139,92,246,0.15), 0 0 20px rgba(139,92,246,0.1); }
    .glass-input::placeholder { color: rgba(255,255,255,0.25); }
    .glass-input option { background: #1a1535; color: white; }

    .btn-primary { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; border-radius: 10px; font-weight: 600; transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; border: 1px solid rgba(139,92,246,0.5); }
    .btn-primary::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform: rotate(45deg) translateX(-100%); transition: transform 0.5s; }
    .btn-primary:hover::before { transform: rotate(45deg) translateX(100%); }
    .btn-primary:hover { box-shadow: 0 0 25px rgba(139,92,246,0.6), 0 0 50px rgba(139,92,246,0.2); transform: translateY(-2px); }

    .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; border-radius: 10px; font-weight: 600; transition: all 0.3s; cursor: pointer; border: 1px solid rgba(16,185,129,0.4); }
    .btn-success:hover { box-shadow: 0 0 25px rgba(16,185,129,0.5); transform: translateY(-2px); }

    .badge-open { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.4); box-shadow: 0 0 10px rgba(99,102,241,0.2); }
    .badge-progress { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.4); box-shadow: 0 0 10px rgba(245,158,11,0.2); }
    .badge-closed { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.4); box-shadow: 0 0 10px rgba(16,185,129,0.2); }
    .badge-high { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.4); box-shadow: 0 0 10px rgba(239,68,68,0.2); }
    .badge-medium { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.4); }
    .badge-low { background: rgba(107,114,128,0.15); color: #d1d5db; border: 1px solid rgba(107,114,128,0.3); }

    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .glow-text { text-shadow: 0 0 20px rgba(139,92,246,0.8), 0 0 40px rgba(139,92,246,0.4); }
    .corner-tl { position: absolute; top: -1px; left: -1px; width: 16px; height: 16px; border-top: 2px solid #8b5cf6; border-left: 2px solid #8b5cf6; }
    .corner-br { position: absolute; bottom: -1px; right: -1px; width: 16px; height: 16px; border-bottom: 2px solid #8b5cf6; border-right: 2px solid #8b5cf6; }

    .page-enter { animation: pageEnter 0.5s ease forwards; }
    @keyframes pageEnter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .stagger > * { animation: pageEnter 0.4s ease forwards; opacity: 0; }
    .stagger > *:nth-child(1) { animation-delay: 0.05s; }
    .stagger > *:nth-child(2) { animation-delay: 0.1s; }
    .stagger > *:nth-child(3) { animation-delay: 0.15s; }
    .stagger > *:nth-child(4) { animation-delay: 0.2s; }

    .ticket-row { transition: all 0.2s; border-bottom: 1px solid rgba(139,92,246,0.08); }
    .ticket-row:hover { background: rgba(139,92,246,0.06); box-shadow: inset 0 0 20px rgba(139,92,246,0.05); }

    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #8b5cf6; display: inline-block; animation: pulse 2s ease infinite; margin-right: 6px; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(139,92,246,0.6); } 50% { box-shadow: 0 0 0 6px rgba(139,92,246,0); } }

    /* Bar chart animation */
    .bar-fill { animation: barGrow 1.2s cubic-bezier(0.4,0,0.2,1) forwards; transform-origin: bottom; }
    @keyframes barGrow { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }

    /* Progress bar */
    .progress-fill { animation: progressGrow 1.5s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes progressGrow { from { width: 0%; } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.4); border-radius: 2px; }

    main { position: relative; z-index: 1; }

    /* Full width layout */
    .layout-full { max-width: 100%; padding: 0 2rem; }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <nav class="glass-nav px-8 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="relative">
        <div class="w-9 h-9 rounded-lg btn-primary flex items-center justify-center text-sm font-bold font-mono">T</div>
        <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-purple-400 rounded-full animate-ping"></span>
        <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-purple-400 rounded-full"></span>
      </div>
      <div>
        <span class="text-white font-bold text-lg tracking-wide">Ticket<span class="text-purple-400 glow-text">OS</span></span>
        <div class="flex items-center gap-1.5">
          <span class="pulse-dot" style="width:5px;height:5px;margin:0"></span>
          <span class="text-white/30 text-xs font-mono">SYSTEM ONLINE</span>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-6">
      <a href="/" class="text-white/50 hover:text-purple-300 text-sm transition font-mono">[ DASHBOARD ]</a>
      <a href="/create" class="btn-primary px-5 py-2 text-sm font-mono">+ NEW TICKET</a>
    </div>
  </nav>

  <main class="w-full px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 35; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `left:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s;opacity:${Math.random()*0.6+0.2};background:${Math.random()>0.5?'rgba(139,92,246,0.8)':'rgba(99,102,241,0.8)'};`;
      container.appendChild(p);
    }
  </script>
</body>
</html>
